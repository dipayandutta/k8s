apiVersion: v1
kind: Namespace
metadata:
  name: nginx-namespace-test

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mynginx
  namespace: nginx-namespace-test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mynginx

  template:
    metadata:
      labels:
        app: mynginx

    spec:
      containers:
        - name: nginx
          image: nginx

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: mynginx-service
  namespace: nginx-namespace-test

spec:
  type: NodePort

  selector:
    app: mynginx

  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
      nodePort: 30080
