apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app:  web-deployment
  template:
    metadata:
      labels:
        app:  web-deployment
        env:  test
    spec:
      containers:
      - name: nginx
        image:  nginx:latest
        ports:
        - containerPort:  80
