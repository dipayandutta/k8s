apiVersion: v1
kind: Pod
metadata:
  name: mysql
  labels:
    app:  mysql-server
    role: mysql-database
spec:
  containers:
    - name: mysql
      image:  mysql:8.0
      envFrom:
        - configMapRef:
            name: mysql-db-config
      env:
        - name: MYSQL_ROOT_PASSWORD
          value:  "rootpassword"
  initContainers:
    - name: init-mysql
      image:  busybox:1.35
      command:  ["sh","-c","echo Init Complete"]
